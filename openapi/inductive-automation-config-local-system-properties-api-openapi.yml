openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control config-local-system-properties API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: config-local-system-properties
  description: Local system properties
paths:
  /data/api/v1/resources/ignition/local-system-properties:
    put:
      summary: Modify Local System Properties
      operationId: modify-local-system-properties-put
      tags:
      - config-local-system-properties
      description: Modify one or more Local System Properties resources
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                systemUID: <string>
                demoTimeRemaining: 7200
              backupConfig:
                systemUID: <string>
                demoTimeRemaining: 7200
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                systemUID: <string>
                demoTimeRemaining: 7200
              backupConfig:
                systemUID: <string>
                demoTimeRemaining: 7200
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    post:
      summary: Create Local System Properties
      operationId: create-local-system-properties-post
      tags:
      - config-local-system-properties
      description: Create the Local System Properties resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                systemUID: <string>
                demoTimeRemaining: 7200
              backupConfig:
                systemUID: <string>
                demoTimeRemaining: 7200
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                systemUID: <string>
                demoTimeRemaining: 7200
              backupConfig:
                systemUID: <string>
                demoTimeRemaining: 7200
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/ignition/local-system-properties/{signature}:
    delete:
      summary: Delete Local System Properties
      operationId: delete-local-system-properties-delete
      tags:
      - config-local-system-properties
      description: Delete the Local System Properties resource.
      parameters:
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/singleton/ignition/local-system-properties:
    get:
      summary: Get Local System Properties Config
      operationId: get-local-system-properties-config-get
      tags:
      - config-local-system-properties
      description: Retrieve configuration details about the Local System Properties resource
      parameters:
      - name: defaultIfUndefined
        in: query
        required: false
        schema:
          type: string
        description: If true, return the default configuration if the resource is not defined. Otherwise, return 404. Default is false.
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to read the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/type/ignition/local-system-properties:
    get:
      summary: Describe 'Local System Properties' Resource Type
      operationId: describe-'local-system-properties'-resource-type-get
      tags:
      - config-local-system-properties
      description: Describe the Local System Properties resource type
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for details.
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
