        description: If true, invalid references will be allowed. Default is false.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                installMode: <string>
                controllerSettings:
                  eventTableName: <string>
                  archiveLocationMode: <string>
                  archivePath: <string>
                  lowDiskThresholdMB: <number>
                  datasource: <string>
                  maxRetainedBackupCount: <number>
                  backupRetentionAge: <number>
                  backupRetentionTimeUnit: <string>
                agentSettings:
