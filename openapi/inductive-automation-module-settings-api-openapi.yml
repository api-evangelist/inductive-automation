                  archiveLocationMode: <string>
                  archivePath: <string>
                  lowDiskThresholdMB: <number>
                  datasource: <string>
                  maxRetainedBackupCount: <number>
                  backupRetentionAge: <number>
                  backupRetentionTimeUnit: <string>
                agentSettings:
                  controllerServerId: <string>
                  sendStatsInterval: <number>
                  httpConnectTimeout: <number>
                  httpReadTimeout: <number>
                  forwardLeasedLicense: <boolean>
