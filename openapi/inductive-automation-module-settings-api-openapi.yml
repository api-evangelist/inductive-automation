      operationId: create-module-settings-post
      tags:
      - module-settings
      description: Create the Module Settings resource
      parameters:
      - name: allowInvalidReferences
        in: query
        required: false
        schema:
          type: string
        description: If true, invalid references will be allowed. Default is false.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - collection: <string>
