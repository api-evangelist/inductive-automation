  /data/api/v1/resources/singleton/com.inductiveautomation.eam/module-settings:
    get:
      summary: Get Module Settings Config
      operationId: get-module-settings-config-get
      tags:
      - module-settings
      description: Retrieve configuration details about the Module Settings resource
      parameters:
      - name: defaultIfUndefined
        in: query
        required: false
        schema:
          type: string
        description: If true, return the default configuration if the resource is not defined. Otherwise, return 404. Default is false.
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to read the resource from
      responses:
