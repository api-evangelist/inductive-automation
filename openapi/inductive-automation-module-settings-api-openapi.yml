  /data/api/v1/resources/com.inductiveautomation.eam/module-settings/{signature}:
    delete:
      summary: Delete Module Settings
      operationId: delete-module-settings-delete
      tags:
      - module-settings
      description: Delete the Module Settings resource.
      parameters:
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      responses:
        '200':
          description: Successful response
          content:
