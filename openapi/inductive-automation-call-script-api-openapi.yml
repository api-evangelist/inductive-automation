  /data/api/v1/resources/com.inductiveautomation.sip-notification/script-settings/{name}/{signature}:
    delete:
      summary: Delete Call Script
      operationId: delete-call-script-delete
      tags:
      - call-script
      description: Delete a Call Script resource by name
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      - name: confirm
        in: query
        required: false
        schema:
          type: string
        description: Whether to confirm the deletion, required when the operation would affect other resources.
      responses:
