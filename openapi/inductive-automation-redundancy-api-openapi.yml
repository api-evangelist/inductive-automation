openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control redundancy API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: redundancy
  description: Gateway redundancy configuration
paths:
  /data/api/v1/redundancy:
    get:
      summary: Status
      operationId: status-get
      tags:
      - redundancy
      description: Information on the current status of the redundancy system.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/redundancy/config:
    get:
      summary: Get Redundancy Config
      operationId: get-redundancy-config-get
      tags:
      - redundancy
      description: The configuration of the redundancy system. Note that the gatewayNetworkSetup section only applies to the redundant backup.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    put:
      summary: Update Redundancy Config
      operationId: update-redundancy-config-put
      tags:
      - redundancy
      description: Updates the configuration of the redundancy system.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
              gatewayNetworkSetup:
                host: <string>
                port: <number>
                enableSsl: <boolean>
                pingRate: <number>
                pingTimeout: <number>
                pingMaxMissed: <number>
                websocketTimeout: <number>
                httpConnectTimeout: <number>
                httpReadTimeout: <number>
                sendThreads: <number>
                receiveThreads: <number>
              activeHistoryLevel: <string>
              joinWaitTime: <number>
              role: <string>
              standbyActivityLevel: <string>
              syncTimeoutSecs: <number>
              autoDetectLocal: <boolean>
              localInterface: <string>
              masterRecoveryMode: <string>
              useActiveUptimeToResolveConflict: <boolean>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/redundancy/events:
    get:
      summary: Log Events
      operationId: log-events-get
      tags:
      - redundancy
      description: Returns log events from the redundancy system.
      parameters:
      - name: timestamp
        in: query
        required: false
        schema:
          type: string
        description: Return all logs since this timestamp (in epoch millis).
      - name: limit
        in: query
        required: false
        schema:
          type: string
        description: The maximum number of items to return.
      - name: offset
        in: query
        required: false
        schema:
          type: string
        description: The number of items to skip before returning results.
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
        description: 'The name of a field to sort by. Use `asc(fieldName)` or `desc(fieldName)`

          to specify the sort direction as ascending or descending, respectively.

          '
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: A search string to filter items by. Terms separated by whitespace.
      - name: key_0
        in: query
        required: false
        schema:
          type: string
        description: 'Filter items by field name, using format like `fieldName[op]=value` where `op` is one of: `eq` (equals), `ne` (not equals), `cn` (contains), `sw` (starts with), `ew` (ends with), `gt` (greater than), `gte` (greater than or equal), `lt` (less than), `lte` (less than or equal), `rgx` (regular expression).'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/redundancy/gwaction/failover:
    post:
      summary: Force Failover
      operationId: force-failover-post
      tags:
      - redundancy
      description: Forces redundant configuration to failover to the backup node.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/redundancy/gwaction/resync:
    post:
      summary: Re-Sync Configuration
      operationId: re-sync-configuration-post
      tags:
      - redundancy
      description: Makes a request to force the re-synchronization of redundant nodes.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/redundancy/providers:
    get:
      summary: Redundancy Provider Metrics
      operationId: redundancy-provider-metrics-get
      tags:
      - redundancy
      description: Information on all the Redundancy Providers this Ignition Gateway knows about.
      parameters:
      - name: limit
        in: query
        required: false
        schema:
          type: string
        description: The maximum number of items to return.
      - name: offset
        in: query
        required: false
        schema:
          type: string
        description: The number of items to skip before returning results.
      - name: sortBy
        in: query
        required: false
        schema:
          type: string
        description: 'The name of a field to sort by. Use `asc(fieldName)` or `desc(fieldName)`

          to specify the sort direction as ascending or descending, respectively.

          '
      - name: search
        in: query
        required: false
        schema:
          type: string
        description: A search string to filter items by. Terms separated by whitespace.
      - name: key_0
        in: query
        required: false
        schema:
          type: string
        description: 'Filter items by field name, using format like `fieldName[op]=value` where `op` is one of: `eq` (equals), `ne` (not equals), `cn` (contains), `sw` (starts with), `ew` (ends with), `gt` (greater than), `gte` (greater than or equal), `lt` (less than), `lte` (less than or equal), `rgx` (regular expression).'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for details.
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
