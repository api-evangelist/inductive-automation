            example:
            - name: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                profile:
                  type: <string>
                  isSuspended: <boolean>
                  scheduleMode: <string>
                  scheduleDetails: <string>
                settings: <object>
              backupConfig:
                profile:
                  type: <string>
                  isSuspended: <boolean>
                  scheduleMode: <string>
                  scheduleDetails: <string>
                settings: <object>
            - name: <string>
