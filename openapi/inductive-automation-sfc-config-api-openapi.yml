openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control sfc-config API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: sfc-config
  description: Sequential Function Chart configuration
paths:
  /data/api/v1/resources/com.inductiveautomation.sfc/chart-settings:
    put:
      summary: Modify SFC Settings
      operationId: modify-sfc-settings-put
      tags:
      - sfc-config
      description: Modify one or more SFC Settings resources
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
              backupConfig:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
              backupConfig:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    post:
      summary: Create SFC Settings
      operationId: create-sfc-settings-post
      tags:
      - sfc-config
      description: Create the SFC Settings resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
              backupConfig:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
              backupConfig:
                chartRecordingEnabled: <boolean>
                recordingsPerChart: <number>
                pruneAge: <number>
                pruneAgeUnits: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/com.inductiveautomation.sfc/chart-settings/{signature}:
    delete:
      summary: Delete SFC Settings
      operationId: delete-sfc-settings-delete
      tags:
      - sfc-config
      description: Delete the SFC Settings resource.
      parameters:
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/singleton/com.inductiveautomation.sfc/chart-settings:
    get:
      summary: Get SFC Settings Config
      operationId: get-sfc-settings-config-get
      tags:
      - sfc-config
      description: Retrieve configuration details about the SFC Settings resource
      parameters:
      - name: defaultIfUndefined
        in: query
        required: false
        schema:
          type: string
        description: If true, return the default configuration if the resource is not defined. Otherwise, return 404. Default is false.
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to read the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/type/com.inductiveautomation.sfc/chart-settings:
    get:
      summary: Describe 'SFC Settings' Resource Type
      operationId: describe-'sfc-settings'-resource-type-get
      tags:
      - sfc-config
      description: Describe the SFC Settings resource type
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for details.
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
