openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control config-edge-system-properties API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: config-edge-system-properties
  description: Edge system properties
paths:
  /data/api/v1/resources/ignition/edge-system-properties:
    put:
      summary: Modify Edge System Properties
      operationId: modify-edge-system-properties-put
      tags:
      - config-edge-system-properties
      description: Modify one or more Edge System Properties resources
      parameters:
      - name: allowInvalidReferences
        in: query
        required: false
        schema:
          type: string
        description: If true, invalid references will be allowed. Default is false.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
              backupConfig:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
              backupConfig:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    post:
      summary: Create Edge System Properties
      operationId: create-edge-system-properties-post
      tags:
      - config-edge-system-properties
      description: Create the Edge System Properties resource
      parameters:
      - name: allowInvalidReferences
        in: query
        required: false
        schema:
          type: string
        description: If true, invalid references will be allowed. Default is false.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
              backupConfig:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
              backupConfig:
                projectName: Edge
                tagProvider: edge
                historianName: Edge Historian
                visualizationName: VISION
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/ignition/edge-system-properties/{signature}:
    delete:
      summary: Delete Edge System Properties
      operationId: delete-edge-system-properties-delete
      tags:
      - config-edge-system-properties
      description: Delete the Edge System Properties resource.
      parameters:
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/singleton/ignition/edge-system-properties:
    get:
      summary: Get Edge System Properties Config
      operationId: get-edge-system-properties-config-get
      tags:
      - config-edge-system-properties
      description: Retrieve configuration details about the Edge System Properties resource
      parameters:
      - name: defaultIfUndefined
        in: query
        required: false
        schema:
          type: string
        description: If true, return the default configuration if the resource is not defined. Otherwise, return 404. Default is false.
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to read the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/type/ignition/edge-system-properties:
    get:
      summary: Describe 'Edge System Properties' Resource Type
      operationId: describe-'edge-system-properties'-resource-type-get
      tags:
      - config-edge-system-properties
      description: Describe the Edge System Properties resource type
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for details.
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
