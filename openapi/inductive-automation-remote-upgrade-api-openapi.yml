openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control remote-upgrade API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: remote-upgrade
  description: Remote Gateway upgrade operations
paths:
  /data/api/v1/resources/com.inductiveautomation.eam/remote-upgrade:
    put:
      summary: Modify Remote Upgrade
      operationId: modify-remote-upgrade-put
      tags:
      - remote-upgrade
      description: Modify one or more Remote Upgrade resources
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - name: <string>
              signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
              backupConfig:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
            - name: <string>
              signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
              backupConfig:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    post:
      summary: Create Remote Upgrade
      operationId: create-remote-upgrade-post
      tags:
      - remote-upgrade
      description: Create a new Remote Upgrade resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - name: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
              backupConfig:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
            - name: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
              backupConfig:
                serverId: <string>
                statusTimestamp: <number>
                agentGroup: <string>
                upgradeStatus: <string>
                statusMsg: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/com.inductiveautomation.eam/remote-upgrade/{name}/{signature}:
    delete:
      summary: Delete Remote Upgrade
      operationId: delete-remote-upgrade-delete
      tags:
      - remote-upgrade
      description: Delete a Remote Upgrade resource by name
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      - name: confirm
        in: query
        required: false
        schema:
          type: string
        description: Whether to confirm the deletion, required when the operation would affect other resources.
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/delete/com.inductiveautomation.eam/remote-upgrade:
    post:
      summary: Delete Remote Upgrade (multiple)
      operationId: delete-remote-upgrade-(multiple)-post
      tags:
      - remote-upgrade
      description: Delete multiple Remote Upgrade resources by name
      parameters:
      - name: confirm
        in: query
        required: false
        schema:
          type: string
        description: Whether to confirm the deletion, required when the operation would affect other resources.
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - name: <string>
              signature: <string>
              collection: <string>
            - name: <string>
              signature: <string>
              collection: <string>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/find/com.inductiveautomation.eam/remote-upgrade/{name}:
