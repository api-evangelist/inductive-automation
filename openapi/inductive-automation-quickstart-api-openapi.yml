openapi: 3.0.3
info:
  title: Ignition Gateway REST access-control quickstart API
  description: The Ignition Gateway REST API (Ignition 8.3+) provides an OpenAPI-compliant HTTP interface to Gateway configuration resources including tags, projects, modules, device connections, historian data, user management (SCIM), alarm notification, OPC connections, and more. The specification is dynamically generated based on installed modules. Authentication uses API keys exchanged for time-limited tokens via the X-Ignition-API-Token header. Mutative requests are audit-logged. Supports Kubernetes and Helm-based cloud-native deployments.
  version: 8.3.0
  contact:
    name: Inductive Automation Support
    url: https://support.inductiveautomation.com/
  license:
    name: Commercial
    url: https://inductiveautomation.com/pricing/
  x-postman-collection: https://raw.githubusercontent.com/inductiveautomation/83-api/main/postman/8.3.postman_collection_v2.json
servers:
- url: http://{gateway-host}:{port}
  description: Ignition Gateway (HTTP)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8088'
      description: Gateway HTTP port (default 8088; HTTPS default 8043)
- url: https://{gateway-host}:{port}
  description: Ignition Gateway (HTTPS)
  variables:
    gateway-host:
      default: localhost
      description: Hostname or IP address of the Ignition Gateway
    port:
      default: '8043'
      description: Gateway HTTPS port
security:
- apiKeyAuth: []
tags:
- name: quickstart
  description: Quick-start setup wizard
paths:
  /data/api/v1/resources/ignition/quickstart:
    put:
      summary: Modify Quick Start Configuration
      operationId: modify-quick-start-configuration-put
      tags:
      - quickstart
      description: Modify one or more Quick Start Configuration resources
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                finished: <boolean>
                steps: <array>
              backupConfig:
                finished: <boolean>
                steps: <array>
            - signature: <string>
              collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                finished: <boolean>
                steps: <array>
              backupConfig:
                finished: <boolean>
                steps: <array>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
    post:
      summary: Create Quick Start Configuration
      operationId: create-quick-start-configuration-post
      tags:
      - quickstart
      description: Create the Quick Start Configuration resource
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                finished: <boolean>
                steps: <array>
              backupConfig:
                finished: <boolean>
                steps: <array>
            - collection: <string>
              enabled: <boolean>
              description: <string>
              config:
                finished: <boolean>
                steps: <array>
              backupConfig:
                finished: <boolean>
                steps: <array>
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/ignition/quickstart/{signature}:
    delete:
      summary: Delete Quick Start Configuration
      operationId: delete-quick-start-configuration-delete
      tags:
      - quickstart
      description: Delete the Quick Start Configuration resource.
      parameters:
      - name: signature
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to delete the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/singleton/ignition/quickstart:
    get:
      summary: Get Quick Start Configuration Config
      operationId: get-quick-start-configuration-config-get
      tags:
      - quickstart
      description: Retrieve configuration details about the Quick Start Configuration resource
      parameters:
      - name: defaultIfUndefined
        in: query
        required: false
        schema:
          type: string
        description: If true, return the default configuration if the resource is not defined. Otherwise, return 404. Default is false.
      - name: collection
        in: query
        required: false
        schema:
          type: string
        description: The configuration collection to read the resource from
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/type/ignition/quickstart:
    get:
      summary: Describe 'Quick Start Configuration' Resource Type
      operationId: describe-'quick-start-configuration'-resource-type-get
      tags:
      - quickstart
      description: Describe the Quick Start Configuration resource type
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for details.
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
