          description: Successful response
          content:
            application/json:
              schema:
                type: object
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '404':
          description: Not found
  /data/api/v1/resources/names/com.inductiveautomation.eam/module-eulas:
    get:
      summary: Get Module EULA Names
      operationId: get-module-eula-names-get
      tags:
      - module-eula
      description: List all Module EULA resources, including just names and enabled bit
      parameters:
      - name: limit
