  /data/api/v1/resources/rename/com.inductiveautomation.eam/module-eulas/{name}:
    post:
      summary: Rename Module EULA
      operationId: rename-module-eula-post
      tags:
      - module-eula
      description: Change the name of a Module EULA resource, and update all references to it
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
      - name: collection
        in: query
