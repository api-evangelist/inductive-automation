      operationId: acquire-configuration-scan-lock-post
      tags:
      - config-management
      description: 'Prevents changes from being applied to the configuration system for a limited time. Time may be specified

        in the request body. While this lock is held, any other changes will be queued (block) until the

        lock is released. While locked, it is safe to make external changes to the filesystem.

        The next call to `POST /data/api/v1/scan/config` will release the lock.'
      requestBody:
        content:
          application/json:
            schema:
              type: object
            example:
              acquireTimeout: <number>
              holdTimeout: <number>
      responses:
        '200':
