components:
  securitySchemes:
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-Ignition-API-Token
      description: Time-limited API token. Obtain by posting credentials to the token endpoint. See /data/api/v1/token for
        details.
  schemas:
    ResourceRecord:
      type: object
      description: A generic Ignition Gateway configuration resource record
      properties:
        signature:
          type: string
          description: Unique resource signature (used for updates and deletes)
        collection:
          type: string
          description: Resource collection identifier
        enabled:
          type: boolean
          description: Whether the resource is enabled
        description:
          type: string
          description: Human-readable description of the resource
        config:
          type: object
          description: Resource-specific configuration object
    ScimUser:
      type: object
      description: SCIM 2.0 User object
      properties:
        id:
          type: string
        userName:
          type: string
        displayName:
          type: string
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
                format: email
              primary:
                type: boolean
        groups:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              display:
                type: string
        active:
          type: boolean
        meta:
          type: object
          properties:
            resourceType:
              type: string
            created:
              type: string
              format: date-time
            lastModified:
              type: string
              format: date-time
    ScimGroup:
      type: object
      description: SCIM 2.0 Group object
      properties:
        id:
          type: string
        displayName:
          type: string
        members:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              display:
                type: string
    GatewayInfo:
      type: object
      description: General information about the Ignition Gateway
      properties:
        name:
          type: string
          description: Gateway name
        version:
          type: string
          description: Ignition version
        edition:
          type: string
          description: Ignition edition (Standard, Edge, etc.)
        platform:
          type: string
          description: Host operating system platform
        uptime:
          type: integer
          description: Gateway uptime in milliseconds
        redundancyState:
          type: string
          description: Redundancy state (Independent, Master, Backup)
        modules:
          type: array
          items:
            $ref: '#/components/schemas/ModuleInfo'
    ModuleInfo:
      type: object
      description: Information about an installed Ignition module
      properties:
        id:
          type: string
          description: Module ID (e.g., com.inductiveautomation.perspective)
        name:
          type: string
          description: Display name of the module
        version:
          type: string
          description: Module version string
        state:
          type: string
          description: Module state (Loaded, Licensed, etc.)
        description:
          type: string
    TagProvider:
      type: object
      description: Tag provider configuration record
      properties:
        name:
          type: string
          description: Tag provider name
        signature:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        config:
          type: object
          properties:
            type:
              type: string
              description: Provider type (e.g., STANDARD, REALTIME)
    DatabaseConnection:
      type: object
      description: Database connection configuration
      properties:
        name:
          type: string
        signature:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        config:
          type: object
          properties:
            driver:
              type: string
            connectUrl:
              type: string
            username:
              type: string
            extraConnectionProperties:
              type: object
    Project:
      type: object
      description: Ignition project resource
      properties:
        name:
          type: string
          description: Project name
        title:
          type: string
          description: Project display title
        description:
          type: string
        enabled:
          type: boolean
        inheritable:
          type: boolean
        parentProject:
          type: string
          description: Parent project name
        defaultDatasource:
          type: string
        defaultTagProvider:
          type: string
    AlarmJournalResource:
      type: object
      description: Alarm journal resource configuration
      properties:
        signature:
          type: string
        enabled:
          type: boolean
        description:
          type: string
        config:
          type: object
          properties:
            datasource:
              type: string
            storageMethod:
              type: string
            maxSize:
              type: integer
    ErrorResponse:
      type: object
      description: Standard error response
      properties:
        code:
          type: integer
          description: HTTP status code
        message:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details
externalDocs:
  description: Ignition 8.3 Gateway REST API Documentation
  url: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
