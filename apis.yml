aid: inductive-automation
name: Inductive Automation
description: >-
  Inductive Automation is the developer of Ignition, an industrial application platform
  used for SCADA, HMI, MES, and IIoT deployments across manufacturing, utilities, and
  infrastructure. Ignition 8.3 exposes an OpenAPI-compliant REST API through its
  Gateway that provides programmatic access to configuration, tags, projects, and
  modules, enabling containerized and cloud-native industrial automation deployments.
type: Index
url: https://raw.githubusercontent.com/api-evangelist/inductive-automation/refs/heads/main/apis.yml
tags:
  - SCADA
  - HMI
  - Manufacturing
  - IIoT
  - Industrial Automation
  - Industrial IoT
  - OPC UA
created: '2026-06-05'
modified: '2026-06-05'
specificationVersion: '0.19'
apis:
  - aid: inductive-automation:ignition-gateway-rest-api
    name: Ignition Gateway REST API
    description: >-
      The Ignition Gateway REST API (available in Ignition 8.3+) provides an OpenAPI-
      compliant HTTP interface to Gateway configuration resources including tags, projects,
      modules, device connections, and historian data. The API spec is dynamically
      generated and includes all routes exposed by installed modules. Authentication uses
      API keys with time-limited tokens. Mutative requests are audit-logged. Supports
      Kubernetes and Helm-based cloud-native deployments.
    humanURL: https://www.docs.inductiveautomation.com/docs/8.3/platform/gateway/openapi
    baseURL: https://{gateway-host}:8088/api
    tags:
      - SCADA
      - Industrial Automation
      - Tags
      - Configuration
      - OpenAPI
      - REST
